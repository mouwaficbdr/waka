# cargo-deny configuration
# https://embarkstudios.github.io/cargo-deny/

[graph]
targets = [
    "x86_64-unknown-linux-gnu",
    "x86_64-unknown-linux-musl",
    "aarch64-unknown-linux-gnu",
    "x86_64-apple-darwin",
    "aarch64-apple-darwin",
    "x86_64-pc-windows-msvc",
]

# ─────────────────────────────────────────
# Security advisories
# ─────────────────────────────────────────
[advisories]
version = 2
db-path = "~/.cargo/advisory-db"
db-urls = ["https://github.com/rustsec/advisory-db"]
yanked = "deny"

# ─────────────────────────────────────────
# Licenses — only permissive licenses allowed
# ─────────────────────────────────────────
[licenses]
version = 2
allow = [
    "MIT",
    "Apache-2.0",
    "Apache-2.0 WITH LLVM-exception",
    "BSD-2-Clause",
    "BSD-3-Clause",
    "ISC",
    "Unicode-DFS-2016",
    "Unicode-3.0",       # ICU crates (icu_collections, icu_properties, tinystr, …)
    "OpenSSL",           # aws-lc-sys (cryptography — ISC AND … AND OpenSSL)
    "MPL-2.0",           # option-ext (weak copyleft, modifications to the file only)
    "WTFPL",             # terminfo (essentially public domain)
    "CDLA-Permissive-2.0", # webpki-root-certs (permissive data license)
    "CC0-1.0",
    "Zlib",
]
unused-allowed-license = "warn"

# ─────────────────────────────────────────
# Bans — prevent duplicates and unwanted crates
# ─────────────────────────────────────────
[bans]
multiple-versions = "warn"
wildcards = "deny"
deny = [
    # Never use openssl — we use rustls
    { name = "openssl" },
    { name = "openssl-sys" },
    # Avoid old/unmaintained time crate
    { name = "time", wrappers = ["chrono"] },
]

# ─────────────────────────────────────────
# Sources — only crates.io and our own repo
# ─────────────────────────────────────────
[sources]
unknown-registry = "deny"
unknown-git = "deny"
allow-registry = ["https://github.com/rust-lang/crates.io-index"]


