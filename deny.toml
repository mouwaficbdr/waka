# cargo-deny configuration
# https://embarkstudios.github.io/cargo-deny/

[graph]
targets = [
    "x86_64-unknown-linux-gnu",
    "x86_64-unknown-linux-musl",
    "aarch64-unknown-linux-gnu",
    "x86_64-apple-darwin",
    "aarch64-apple-darwin",
    "x86_64-pc-windows-msvc",
]

# ─────────────────────────────────────────
# Security advisories
# ─────────────────────────────────────────
[advisories]
version = 2
db-path = "~/.cargo/advisory-db"
db-urls = ["https://github.com/rustsec/advisory-db"]
yanked = "deny"

# ─────────────────────────────────────────
# Licenses — only permissive licenses allowed
# ─────────────────────────────────────────
[licenses]
version = 2
allow = [
    "MIT",
    "Apache-2.0",
    "Apache-2.0 WITH LLVM-exception",
    "BSD-2-Clause",
    "BSD-3-Clause",
    "ISC",
    "Unicode-DFS-2016",
    "CC0-1.0",
    "Zlib",
]
deny = [
    "GPL-2.0",
    "GPL-3.0",
    "LGPL-2.0",
    "LGPL-2.1",
    "LGPL-3.0",
    "AGPL-3.0",
]
copyleft = "deny"
allow-osi-fsf-free = "neither"
default = "deny"
unused-allowed-license = "warn"

# ─────────────────────────────────────────
# Bans — prevent duplicates and unwanted crates
# ─────────────────────────────────────────
[bans]
multiple-versions = "warn"
wildcards = "deny"
deny = [
    # Never use openssl — we use rustls
    { name = "openssl" },
    { name = "openssl-sys" },
    # Avoid old/unmaintained time crate
    { name = "time", wrappers = ["chrono"] },
]

# ─────────────────────────────────────────
# Sources — only crates.io and our own repo
# ─────────────────────────────────────────
[sources]
unknown-registry = "deny"
unknown-git = "deny"
allow-registry = ["https://github.com/rust-lang/crates.io-index"]
