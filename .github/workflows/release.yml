name: Release

on:
  push:
    tags:
      - "v*.*.*"

permissions:
  contents: write

jobs:
  # ────────────────────────────────────────────────
  # Run full CI before releasing — never release red code
  # ────────────────────────────────────────────────
  pre-release-checks:
    name: Pre-release CI
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt, clippy
      - uses: Swatinem/rust-cache@v2
      - run: cargo fmt --all -- --check
      - run: cargo clippy --all-targets --all-features -- -D warnings
      - name: Install cargo-nextest
        uses: taiki-e/install-action@nextest
      - run: cargo nextest run --all-features

  # ────────────────────────────────────────────────
  # cargo-dist — builds binaries + creates GitHub Release
  # ────────────────────────────────────────────────
  dist:
    name: Distribution Build
    needs: pre-release-checks
    uses: "axodotdev/cargo-dist/.github/workflows/release.yml@v0.30.4"
    secrets: inherit

  # ────────────────────────────────────────────────
  # Publish waka-api to crates.io (Phase 3+)
  # ────────────────────────────────────────────────
  publish-crates:
    name: Publish to crates.io
    needs: dist
    runs-on: ubuntu-latest
    # Only publish waka-api after v0.4.0 (Phase 3)
    if: startsWith(github.ref_name, 'v0.4') || startsWith(github.ref_name, 'v1.')
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - name: Publish waka-api
        run: cargo publish -p waka-api
        env:
          CARGO_REGISTRY_TOKEN: ${{ secrets.CRATES_IO_TOKEN }}

  # ────────────────────────────────────────────────
  # Update CHANGELOG.md and push
  # ────────────────────────────────────────────────
  changelog:
    name: Update CHANGELOG
    needs: dist
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - name: Install git-cliff
        uses: kenji-miyake/setup-git-cliff@v2
      - name: Generate CHANGELOG
        run: git cliff --output CHANGELOG.md
      - name: Commit CHANGELOG
        uses: stefanzweifel/git-auto-commit-action@v5
        with:
          commit_message: "chore(changelog): update CHANGELOG for ${{ github.ref_name }}"
          file_pattern: CHANGELOG.md
          commit_options: "--no-verify"
