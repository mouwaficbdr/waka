name: Bug Report
description: Something isn't working as expected
title: "[bug]: "
labels: ["bug"]
body:
  - type: markdown
    attributes:
      value: |
        Thanks for taking the time to report a bug. Please fill out the sections below.

  - type: input
    id: version
    attributes:
      label: waka version
      description: Output of `waka --version`
      placeholder: "waka 0.2.0"
    validations:
      required: true

  - type: dropdown
    id: os
    attributes:
      label: Operating System
      options:
        - Linux (x86_64)
        - Linux (ARM64)
        - macOS (Intel)
        - macOS (Apple Silicon)
        - Windows
        - Other
    validations:
      required: true

  - type: textarea
    id: command
    attributes:
      label: Command executed
      description: The exact command you ran
      placeholder: "waka stats today --format json"
    validations:
      required: true

  - type: textarea
    id: expected
    attributes:
      label: Expected behavior
      description: What did you expect to happen?
    validations:
      required: true

  - type: textarea
    id: actual
    attributes:
      label: Actual behavior
      description: What actually happened? Include the full output.
      render: shell
    validations:
      required: true

  - type: textarea
    id: verbose
    attributes:
      label: Verbose output (if applicable)
      description: Output of the same command with `--verbose`
      render: shell

  - type: textarea
    id: context
    attributes:
      label: Additional context
      description: Anything else that might be relevant (shell, terminal emulator, etc.)
