# git-cliff configuration
# https://git-cliff.org/docs/configuration

[changelog]
header = """
# Changelog

All notable changes to `waka` are documented here.

Format: [Conventional Commits](https://www.conventionalcommits.org/)
Versioning: [Semantic Versioning](https://semver.org/)

"""
body = """
{% if version %}\
    ## [{{ version | trim_start_matches(pat="v") }}] - {{ timestamp | date(format="%Y-%m-%d") }}
{% else %}\
    ## [Unreleased]
{% endif %}\
{% for group, commits in commits | group_by(attribute="group") %}
    ### {{ group | striptags | trim | upper_first }}
    {% for commit in commits %}
        - {% if commit.scope %}**{{ commit.scope }}**: {% endif %}\
            {{ commit.message | upper_first }}\
            {% if commit.breaking %} ⚠ BREAKING{% endif %} \
            ([`{{ commit.id | truncate(length=7, end="") }}`](https://github.com/mouwaficbdr/waka/commit/{{ commit.id }}))\
    {% endfor %}
{% endfor %}\n
"""
footer = """
<!-- generated by git-cliff -->
"""
trim = true

[git]
conventional_commits = true
filter_unconventional = true
split_commits = false
commit_preprocessors = []
commit_parsers = [
    { message = "^feat", group = "<!-- 0 -->🚀 Features" },
    { message = "^fix", group = "<!-- 1 -->🐛 Bug Fixes" },
    { message = "^perf", group = "<!-- 2 -->⚡ Performance" },
    { message = "^refactor", group = "<!-- 3 -->♻️ Refactoring" },
    { message = "^docs", group = "<!-- 4 -->📚 Documentation" },
    { message = "^test", group = "<!-- 5 -->🧪 Testing" },
    { message = "^ci", group = "<!-- 6 -->⚙️ CI/CD" },
    { message = "^chore\\(deps", group = "<!-- 7 -->📦 Dependencies" },
    { message = "^chore", group = "<!-- 8 -->🔧 Miscellaneous" },
    { message = "^style", skip = true },
    { message = "^revert", group = "<!-- 9 -->⏪ Reverts" },
]
protect_breaking_commits = true
filter_commits = true
tag_pattern = "v[0-9]*"
skip_tags = "v0.1.0-beta.1"
ignore_tags = ""
topo_order = false
sort_commits = "oldest"

[remote.github]
owner = "mouwaficbdr"
repo = "waka"
